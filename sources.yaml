changelog:
  - version: 0.1
    date: 2026-05-03
    notes: |
      Initial source registry. ~140 sources organized by category (no T1/T2/T3).
      Architecture: wide scan + cheap filter + selective deep read.
      Rubric-based tier system explicitly rejected during scope definition;
      signal density determined per-cycle by Haiku triage, not per-source policy.
      Individual influencers as first-class category (was the gap that triggered
      the architectural pivot from tiers to flat).
