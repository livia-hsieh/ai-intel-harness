# sources.yaml — Bi-weekly AI Intel Pipeline
# Version: 0.1 (2026-05-03)
# Architecture: Wide Scan + Cheap Filter + Selective Deep Read (NO T1/T2/T3 tiers)
# See SCOPE.md for full design rationale.
#
# IMPORTANT:
# - Source priority is SIGNAL-DRIVEN per cycle (Haiku filters), not source-static
# - Some entries have URL skeletons; Layer 1 collector resolves at runtime
# - Mechanism A3 will auto-discover sources cited but not listed
# - Health metrics defaults by source_type (see SCOPE.md §10)

meta:
  version: 0.1
  created: 2026-05-03
  total_count_target: ~150
  architecture: wide_scan_cheap_filter_selective_deep
  schema_version: 0.1

geographic_distribution_targets:
  pillar_1:
    taiwan: 0.35
    us: 0.35
    europe: 0.20
    asia_other: 0.10
  enforced_via: synthesizer_ranking_constraint

source_type_health_defaults:
  frontier_lab_blog:
    cadence_trigger: gap_weeks > 8
    signal_floor: not_applied
  personal_blog:
    cadence_trigger: current_gap > p90_historical_gap * 1.5
    signal_floor: rolling_8_items < historical_mean * 0.7
  individual_influencer_multiplatform:
    cadence_trigger: aggregate_gap > 4 weeks
    signal_floor: cross_platform_signal_avg < historical_mean * 0.7
  podcast:
    cadence_trigger: missed_2x_expected_interval
    signal_floor: livia_skip_rate > 0.5
  newsletter:
    cadence_trigger: missed_2_consecutive
    signal_floor: livia_skip_rate > 0.5
  regulatory:
    cadence_trigger: not_applied
    relevance_drift: 3_consecutive_non_ai_items
  paywall:
    human_skip_trigger: 3_consecutive_skips_or_timeouts
  conference:
    cadence_trigger: not_applied
    auto_reactivate: annual_schedule
  research_paper_feed:
    cadence_trigger: not_applied
    filter_drift: post_filter_retention < 0.05 for 4_weeks
  vendor_blog:
    cadence_trigger: gap_weeks > 4
    signal_floor: marketing_tone > 0.6 for 3_weeks
  enterprise_engineering_blog:
    cadence_trigger: gap_weeks > 6
    signal_floor: not_applied

